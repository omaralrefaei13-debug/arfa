<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مرصد تجهيزات عرفات 2026 | النسخة الاحترافية المحدثة</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981; /* Emerald */
            --secondary: #0f172a; /* Deep Slate */
            --bg-main: #f1f5f9;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--secondary);
            scroll-behavior: smooth;
        }

        .grad-primary { background: linear-gradient(135deg, #10b981, #059669); }
        .grad-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .grad-amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .grad-rose { background: linear-gradient(135deg, #f43f5e, #e11d48); }
        .grad-slate { background: linear-gradient(135deg, #475569, #1e293b); }
        .grad-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        @keyframes icon-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-soft { animation: icon-pulse 2s infinite ease-in-out; }

        @keyframes sync-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .sync-spinning { animation: sync-spin 1s linear infinite; }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
        }
        .heatmap-node {
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .heatmap-node:active { transform: scale(0.85); }
        
        .tab-btn-pill { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab-active { background: var(--secondary); color: white !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: scale(1.05); }

        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 9999; display: none; align-items: center; justify-content: center; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out both; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .premium-header {
            background: #0f172a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .kpi-card-interactive {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .kpi-card-interactive:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="antialiased select-none text-right">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-white font-black text-sm tracking-widest text-center">جاري تطبيق التحديثات الاستثنائية...</p>
        </div>
    </div>

    <!-- Floating Refresh -->
    <button onclick="syncData()" id="refreshBtn" class="fixed bottom-8 left-8 z-[1000] grad-primary text-white p-5 rounded-full active:scale-90 transition-all shadow-xl group">
        <i data-lucide="refresh-cw" class="w-7 h-7 group-hover:rotate-180 transition-transform duration-500 text-center text-white"></i>
    </button>

    <header class="premium-header sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center text-right">
            <div class="flex items-center gap-4 text-right">
                <div class="grad-primary p-2.5 rounded-2xl text-white shadow-lg pulse-soft border border-white/10 text-center">
                    <i data-lucide="map-pin" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none tracking-tight">مرصد تجهيزات عرفات 2026</h1>
                    <p id="liveStatusText" class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-1.5 text-right">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                        مزامنة حية
                    </p>
                </div>
            </div>
            <div class="hidden md:block bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-right backdrop-blur-md">
                <div class="flex items-center gap-2.5">
                    <i data-lucide="clock" class="w-4 h-4 text-slate-400 text-right"></i>
                    <span id="currentTime" class="text-xs font-black text-slate-200 tracking-wider text-right">00:00:00 AM</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <!-- KPIs Section -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 animate-in">
            <div onclick="switchCategory('all')" class="glass-card p-6 rounded-[1.8rem] border-r-4 border-emerald-500 shadow-sm text-right kpi-card-interactive">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter block mb-2 text-right">إجمالي المراكز</span>
                <div class="text-4xl font-black text-slate-800 text-right" id="stat-total">0</div>
            </div>
            <div onclick="switchCategory('closed')" class="glass-card p-6 rounded-[1.8rem] border-r-4 border-rose-500 shadow-sm text-right kpi-card-interactive">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter block mb-2 text-right">مغلق حالياً</span>
                <div class="text-4xl font-black text-slate-800 text-right" id="stat-closed">0</div>
            </div>
            <div onclick="switchCategory('freezer')" class="glass-card p-6 rounded-[1.8rem] border-r-4 border-cyan-500 shadow-sm text-right kpi-card-interactive">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter block mb-2 text-right">تعثرات الثلاجات</span>
                <div class="text-4xl font-black text-slate-800 text-right" id="stat-freezer">0</div>
            </div>
            <div onclick="switchCategory('maintenance')" class="glass-card p-6 rounded-[1.8rem] border-r-4 border-slate-600 shadow-sm text-right kpi-card-interactive">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter block mb-2 text-right">تحت الصيانة</span>
                <div class="text-4xl font-black text-slate-800 text-right" id="stat-maint">0</div>
            </div>
        </section>

        <!-- Heatmap Section -->
        <section class="glass-card rounded-[2.5rem] p-8 animate-in text-right">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 text-right">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 p-2.5 rounded-xl text-white shadow-lg text-center"><i data-lucide="grid-3x3" class="w-5 h-5"></i></div>
                    <h2 class="text-xl font-black text-slate-800 tracking-tight text-right">خريطة جاهزية عرفات الرقمية</h2>
                </div>
                <div class="flex bg-slate-50 p-2 rounded-2xl border border-slate-200 gap-4 text-right text-[10px] font-black uppercase text-slate-500">
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div> جاهز</div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_8px_#f59e0b]"></div> تعثر بسيط</div>
                    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div> تعثر حرج</div>
                </div>
            </div>
            <div id="heatmapContainer" class="heatmap-grid text-right"></div>
        </section>

        <!-- Search & Filter Area -->
        <section id="explorer" class="space-y-4 animate-in text-right">
            
            <div class="w-full relative group text-right">
                <input type="text" id="searchInput" placeholder="بحث برقم المركز، المتعهد، أو المراقب..." class="w-full pl-6 pr-14 py-5 bg-white border-2 border-slate-100 rounded-[2rem] outline-none focus:ring-8 focus:ring-blue-500/5 focus:border-blue-500 transition-all font-bold text-right shadow-sm group-hover:border-slate-300">
                <i data-lucide="search" class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-emerald-500 transition-all text-right"></i>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 bg-white/50 p-3 rounded-[2.5rem] border border-slate-100 shadow-inner text-right">
                <button data-category="all" onclick="switchCategory('all')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500 tab-active"><i data-lucide="layout-grid" class="w-4 h-4"></i> الكل</button>
                <button data-category="closed" onclick="switchCategory('closed')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="lock" class="w-4 h-4 text-rose-500"></i> مغلق</button>
                <button data-category="tools" onclick="switchCategory('tools')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="utensils" class="w-4 h-4 text-emerald-500"></i> الأدوات والمعدات</button>
                <button data-category="freezer" onclick="switchCategory('freezer')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="snowflake" class="w-4 h-4 text-cyan-500"></i> الثلاجات</button>
                <button data-category="buffet" onclick="switchCategory('buffet')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="armchair" class="w-4 h-4 text-amber-500"></i> طاولات البوفية</button>
                <button data-category="maintenance" onclick="switchCategory('maintenance')" class="tab-btn-pill px-6 py-4 bg-white border border-slate-200 rounded-full text-xs font-black text-slate-500"><i data-lucide="wrench" class="w-4 h-4 text-slate-500"></i> تحت الصيانة</button>
            </div>
            
            <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-24 text-right"></div>
        </section>
    </main>

    <script>
        const CONST_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4MimFjohpaVG6DdIyoeSCwyCrZDX3CL4mEZQ42QHgZCG2r6u6-TQ0SOlY77wJOgP_8zMNgEy1to3e/pub?gid=525538098&single=true&output=csv"; 
        
        // أرقام المراكز التي تحت الصيانة (تم استبعاد مركز 99 بطلبك)
        const MAINTENANCE_CENTERS = ["26", "102"];

        let allEntries = [];
        let reportData = { closed: [], tools: [], freezer: [], buffet: [], maintenance: [] };
        const state = { currentCategory: 'all', searchQuery: '', isExactId: false };

        function switchCategory(cat) {
            state.searchQuery = '';
            state.isExactId = false; 
            document.getElementById('searchInput').value = '';
            state.currentCategory = cat;
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === cat));
            renderCards();
        }

        async function syncData() {
            const btnIcon = document.querySelector('#refreshBtn [data-lucide="refresh-cw"]');
            if (btnIcon) btnIcon.classList.add('sync-spinning');
            document.getElementById('loading').style.display = 'flex';
            try {
                const response = await fetch(CONST_CSV_URL);
                if (!response.ok) throw new Error('Fetch failed');
                const csvText = await response.text();
                processCSV(csvText);
                renderAll();
                document.getElementById('liveStatusText').innerHTML = `<span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span> تزامن حي: ` + new Date().toLocaleTimeString('ar-SA');
            } catch (e) { 
                console.error(e); 
            } finally { 
                setTimeout(() => { 
                    document.getElementById('loading').style.display = 'none'; 
                    if (btnIcon) btnIcon.classList.remove('sync-spinning'); 
                }, 500); 
            }
        }

        function getImgUrl(raw) {
            if(!raw || raw === "---" || raw.trim() === "" || raw.includes("لا")) return null;
            const match = raw.match(/https?:\/\/[^\s,]+/);
            return match ? match[0] : null;
        }

        function processCSV(text) {
            const lines = text.split(/\r?\n/);
            const results = [];
            const cats = { closed: [], tools: [], freezer: [], buffet: [], maintenance: [] };
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length < 15) continue;
                const clean = (v) => v ? v.replace(/"/g, '').trim() : "";
                
                const entry = {
                    id: clean(col[0]).match(/\d+/)?.[0] || clean(col[0]),
                    timestamp: clean(col[1]),
                    observer: clean(col[2]),
                    contractorName: clean(col[3]),
                    status: clean(col[4]),
                    signpost: clean(col[6]),
                    signpostImg: getImgUrl(clean(col[7])),
                    stovesCount: clean(col[8]),
                    stovesImg: getImgUrl(clean(col[9])),
                    firewood: clean(col[10]),
                    freezer: clean(col[11]),
                    toolsFail: clean(col[12]).includes('لا'),
                    toolsImg: getImgUrl(clean(col[13])),
                    note: clean(col[15]) || "لا توجد ملاحظات",
                    buffet: clean(col[16]),
                    buffetImg: getImgUrl(clean(col[17])),
                };

                let heatmapScore = 0;
                const centerNum = parseInt(entry.id);
                
                // --- استثناءات خاصة لمركز 99 ---
                if (entry.id === "99") {
                    entry.status = "لا يوجد مطبخ";
                    entry.toolsFail = false;
                    entry.stovesCount = "مكتمل";
                    entry.freezer = "نعم";
                    entry.buffet = "نعم";
                    entry.heatmapScore = 0;
                    entry.isMaintenance = false;
                } else {
                    // منطق التعثر الاعتيادي
                    if(entry.toolsFail) { cats.tools.push(entry); heatmapScore++; }
                    if(entry.stovesCount === "0" || entry.stovesCount.includes('لا')) heatmapScore++;
                    if(entry.freezer.includes('لا')) { cats.freezer.push(entry); } // تعثر الثلاجة خارجي فقط

                    if(centerNum >= 20 && centerNum <= 25) {
                        const isBuffetNo = entry.buffet && entry.buffet.includes('لا');
                        const hasBuffetImg = !!entry.buffetImg;
                        if (isBuffetNo || !hasBuffetImg) {
                            entry.buffetFail = true;
                            cats.buffet.push(entry);
                            heatmapScore++;
                        }
                    }
                    if(entry.status.includes('مغلق')) cats.closed.push(entry);
                    if(MAINTENANCE_CENTERS.includes(entry.id)) {
                        entry.isMaintenance = true;
                        cats.maintenance.push(entry);
                    }
                }

                entry.heatmapScore = entry.id === "99" ? 0 : heatmapScore;
                results.push(entry);
            }
            allEntries = results;
            reportData = cats;
        }

        function renderAll() {
            const updateStat = (id, val) => {
                const el = document.getElementById(id);
                if(el) el.innerText = val;
            };
            updateStat('stat-total', allEntries.length);
            updateStat('stat-closed', reportData.closed.length);
            updateStat('stat-freezer', reportData.freezer.length);
            updateStat('stat-maint', reportData.maintenance.length);
            renderHeatmap();
            renderCards();
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmapContainer');
            container.innerHTML = allEntries.map(entry => {
                let nodeClass = 'grad-primary shadow-[0_0_8px_#10b981]';
                if(entry.heatmapScore === 1) nodeClass = 'grad-amber shadow-[0_0_8px_#f59e0b]';
                else if(entry.heatmapScore > 1) nodeClass = 'grad-rose shadow-[0_0_8px_#f43f5e] text-white';
                if(entry.isMaintenance) nodeClass = 'grad-slate shadow-[0_0_8px_#475569] text-white';
                return `<div onclick="focusCard('${entry.id}')" class="heatmap-node ${nodeClass}" title="${entry.contractorName}">${entry.id}</div>`;
            }).join('');
        }

        function focusCard(id) {
            state.currentCategory = 'all';
            state.isExactId = true; 
            document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.category === 'all'));
            state.searchQuery = id;
            document.getElementById('searchInput').value = id;
            renderCards();
            const el = document.getElementById(`card-${id}`);
            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderCards() {
            const container = document.getElementById('cardsGrid');
            const query = state.searchQuery.toLowerCase();
            let data = (state.currentCategory === 'all') ? allEntries : reportData[state.currentCategory];
            
            const filtered = data.filter(d => {
                if (state.isExactId) return d.id === query; 
                return d.id.includes(query) || d.observer?.toLowerCase().includes(query) || d.contractorName?.toLowerCase().includes(query);
            });
            
            if (filtered.length === 0) { container.innerHTML = `<div class="col-span-full py-32 text-center text-slate-300 font-black italic text-right">لا توجد سجلات مطابقة</div>`; return; }

            container.innerHTML = filtered.map(item => {
                const centerNum = parseInt(item.id);
                const isReady = item.heatmapScore === 0;
                const isClosed = item.status.includes('مغلق');

                // بناء قائمة البنود للعرض
                const itemsList = [
                    { label: 'الشاخص الاستدلالي', fail: false, img: item.signpostImg, val: item.signpost },
                    { label: 'الأدوات والمعدات', fail: item.toolsFail, img: item.toolsImg },
                    { label: 'مواقد الطبخ', fail: (item.stovesCount === "0" || (typeof item.stovesCount === 'string' && item.stovesCount.includes('لا'))), img: item.stovesImg, val: item.stovesCount }
                ];
                
                if (centerNum >= 20 && centerNum <= 25) {
                    const isBuffetNo = item.buffet && item.buffet.includes('لا');
                    const hasBuffetImg = !!item.buffetImg;
                    const isBuffetFail = isBuffetNo || !hasBuffetImg;
                    const statusText = !hasBuffetImg && !isBuffetNo ? " (الإثبات الميداني مفقود)" : "";
                    itemsList.push({ label: 'طاولات البوفية' + statusText, fail: isBuffetFail, img: item.buffetImg, val: item.buffet });
                }

                return `
                    <div id="card-${item.id}" class="glass-card rounded-[2.2rem] p-7 animate-in transition-all text-right relative overflow-hidden group/card text-right">
                        ${item.isMaintenance ? '<div class="absolute top-0 left-0 bg-slate-800 text-white px-4 py-1 text-[9px] font-black rounded-br-2xl z-10 text-right">تحت الصيانة</div>' : ''}
                        ${!isReady || isClosed ? '<div class="absolute top-0 right-0 w-2 h-full bg-rose-500 shadow-lg"></div>' : ''}
                        
                        <div class="flex justify-between items-start mb-5 text-right">
                            <span class="grad-primary text-white px-5 py-1.5 rounded-2xl text-[11px] font-black shadow-lg">مركز #${item.id}</span>
                            <div class="flex items-center gap-1.5 text-slate-400 bg-slate-50 px-3 py-1 rounded-xl border border-slate-100 text-right">
                                <i data-lucide="clock" class="w-3 h-3 text-emerald-500 text-center"></i>
                                <span class="text-[10px] font-bold">${item.timestamp}</span>
                            </div>
                        </div>

                        <h3 class="text-xl font-black text-slate-800 mb-2 leading-tight text-right">${item.contractorName || 'متعهد عرفات الميداني'}</h3>

                        <div class="flex flex-wrap gap-3 mb-6 text-right">
                            <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100 shadow-sm text-center">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-rose-500 text-center"></i>
                                <span class="text-[11px] font-black text-slate-600 uppercase tracking-tighter text-right">شاخص: ${item.signpost || '---'}</span>
                            </div>
                            <div class="flex items-center gap-2 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100 shadow-sm text-right">
                                <i data-lucide="user-check" class="w-3.5 h-3.5 text-emerald-600 text-center text-right"></i>
                                <span class="text-[11px] font-black text-slate-500 text-right">المراقب: ${item.observer}</span>
                            </div>
                        </div>

                        <div class="space-y-3 mb-6 text-right">
                            <div class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-inner text-right">
                                <div class="flex items-center gap-2 text-right">
                                    <i data-lucide="${isClosed ? 'lock' : 'unlock'}" class="w-4 h-4 ${isClosed ? 'text-rose-500' : 'text-emerald-500'} text-right"></i>
                                    <span class="text-[10px] font-black tracking-tight text-right">حالة المطبخ:</span>
                                </div>
                                <span class="text-[11px] font-black ${isClosed ? 'text-rose-600' : 'text-emerald-600'} text-right">${item.status}</span>
                            </div>

                            ${item.isMaintenance ? `
                                <div class="flex items-center gap-2 bg-slate-100 border border-slate-200 p-4 rounded-2xl border-r-4 border-r-slate-800 shadow-inner mb-2 text-center justify-center text-right">
                                    <div class="w-2.5 h-2.5 rounded-full bg-slate-800 shadow-[0_0_10px_#1e293b] animate-pulse text-right"></div>
                                    <span class="text-[12px] font-black text-slate-800 uppercase tracking-widest text-right">المطبخ تحت الصيانة</span>
                                </div>
                            ` : (isReady && !isClosed ? `
                                <div class="flex items-center gap-2 bg-emerald-50 border border-emerald-100 p-4 rounded-2xl border-r-4 border-r-emerald-500 shadow-inner mb-2 text-center justify-center text-right text-right">
                                    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse text-right"></div>
                                    <span class="text-[12px] font-black text-emerald-600 uppercase tracking-widest text-right uppercase">مكتمل الجاهزية الميدانية</span>
                                </div>
                            ` : '')}

                            <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1 text-right">توثيق بنود المراجعة - عرفات:</div>
                            
                            <div class="grid grid-cols-1 gap-2 text-right">
                                ${itemsList.map(f => `
                                    <div class="flex flex-col bg-white border border-slate-100 p-3 rounded-2xl shadow-sm text-right">
                                        <div class="flex items-center justify-between mb-2 text-right">
                                            <div class="flex items-center gap-2 text-right">
                                                <div class="w-2 h-2 rounded-full ${f.fail ? 'bg-rose-500 shadow-[0_0_6px_#ef4444]' : 'bg-emerald-500 shadow-[0_0_6px_#10b981]'} text-right"></div>
                                                <span class="text-[11px] font-black ${f.fail ? 'text-rose-600' : 'text-slate-700'} text-right">${f.label}</span>
                                            </div>
                                            <span class="text-[9px] font-bold ${f.fail ? 'text-rose-400' : 'text-emerald-500'} text-right">${f.fail ? 'تعثر' : 'مكتمل'}</span>
                                        </div>
                                        ${f.img ? `
                                            <a href="${f.img}" target="_blank" class="flex items-center justify-center gap-2 bg-slate-50 border border-slate-100 py-2 rounded-xl text-[10px] font-black text-blue-600 hover:bg-blue-50 transition-colors shadow-sm text-center">
                                                <i data-lucide="image" class="w-3 h-3 text-center"></i> عرض صورة الإثبات
                                            </a>
                                        ` : (f.val ? `<div class="text-right text-[10px] text-slate-500 font-bold px-2 text-right">${f.val}</div>` : `<div class="text-center py-2 text-[9px] text-slate-300 italic font-bold text-center">لا يوجد مرفق بصري</div>`)}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-2 text-right shadow-inner text-right">
                            <div class="flex items-center gap-1.5 mb-1 text-right text-right">
                                <i data-lucide="message-square" class="w-3 h-3 text-slate-400 text-right"></i>
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-right text-right">ملاحظة ميدانية</span>
                            </div>
                            <p class="text-[11px] font-bold text-slate-500 leading-relaxed italic text-right text-right">${item.note}</p>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        document.getElementById('searchInput').oninput = (e) => { state.searchQuery = e.target.value; state.isExactId = false; renderCards(); };
        function updateClock() { const now = new Date(); const timeEl = document.getElementById('currentTime'); if(timeEl) timeEl.innerText = now.toLocaleTimeString('en-US', { hour12: true }); }
        window.onload = () => { syncData(); setInterval(() => syncData(), 60000); setInterval(updateClock, 1000); lucide.createIcons(); };
    </script>
</body>
</html>
